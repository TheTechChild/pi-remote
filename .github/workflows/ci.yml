# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required-status-check name for branch protection: each job ID below is a
# separate check. The `gate` job aggregates them so branch protection only
# needs one required status (`gate`).

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      spec: ${{ steps.filter.outputs.spec }}
      ext: ${{ steps.filter.outputs.ext }}
      daemon: ${{ steps.filter.outputs.daemon }}
      coordinator: ${{ steps.filter.outputs.coordinator }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            spec:
              - 'pi-remote-spec/**'
              - '.github/workflows/ci.yml'
            ext:
              - 'pi-remote-ext/**'
              - 'package.json'
              - 'yarn.lock'
              - 'pi-remote-spec/protocol/**'
              - '.github/workflows/ci.yml'
            daemon:
              - 'pi-remote-daemon/**'
              - 'pi-remote-spec/protocol/**'
              - '.github/workflows/ci.yml'
            coordinator:
              - 'pi-remote-coordinator/**'
              - 'pi-remote-spec/protocol/**'
              - '.github/workflows/ci.yml'
            android:
              - 'pi-remote-android/**'
              - 'pi-remote-spec/protocol/**'
              - '.github/workflows/ci.yml'

  spec:
    name: spec / validate
    needs: changes
    if: needs.changes.outputs.spec == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validators
        run: |
          python -m pip install --upgrade pip
          python -m pip install "check-jsonschema>=0.29" "jsonschema>=4.23"
      - name: Lint protocol schemas (Draft 2020-12 metaschema)
        run: |
          shopt -s globstar
          check-jsonschema --check-metaschema pi-remote-spec/protocol/**/*.json
      - name: Validate fixtures against schemas
        run: python pi-remote-spec/scripts/validate_fixtures.py

  ext:
    name: ext / build
    needs: changes
    if: needs.changes.outputs.ext == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        # Required so that setup-node and subsequent yarn invocations use the
        # Yarn version pinned by the root package.json's packageManager field
        # (see ADR-0005). Must run before setup-node's cache step, which calls
        # `yarn cache dir` and would otherwise fail against the runner's
        # global Yarn 1.22.
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
      - name: Install
        run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Typecheck
        run: yarn typecheck
      - name: Test
        run: yarn test
      - name: Build
        run: yarn build

  daemon:
    name: daemon / build
    needs: changes
    if: needs.changes.outputs.daemon == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi-remote-daemon
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: pi-remote-daemon
          args: --timeout=5m

  coordinator:
    name: coordinator / build
    needs: changes
    if: needs.changes.outputs.coordinator == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false
      - name: Build
        working-directory: pi-remote-coordinator
        run: go build ./...
      - name: Test
        working-directory: pi-remote-coordinator
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: pi-remote-coordinator
          args: --timeout=5m
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container image (smoke test)
        uses: docker/build-push-action@v6
        with:
          context: pi-remote-coordinator
          file: pi-remote-coordinator/deploy/Dockerfile
          push: false
          load: true
          tags: pi-remote-coordinator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-run /v1/health
        run: |
          docker run -d --name coord-smoke -p 18080:8080 pi-remote-coordinator:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/v1/health; then
              echo "OK"; exit 0
            fi
            sleep 1
          done
          echo "coordinator did not become ready" >&2
          docker logs coord-smoke || true
          exit 1
      - name: Downcase registry owner
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push production image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: pi-remote-coordinator
          file: pi-remote-coordinator/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pi-remote-coordinator:latest
            ghcr.io/${{ env.OWNER_LC }}/pi-remote-coordinator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android:
    name: android / build
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi-remote-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint
        run: ./gradlew :app:lint
      - name: Unit tests
        run: ./gradlew test
      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: pi-remote-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  gate:
    name: gate
    needs: [changes, spec, ext, daemon, coordinator, android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded or were skipped
        run: |
          # Each input is one of: success, skipped, failure, cancelled.
          # We want all to be in {success, skipped}. `changes` must be success.
          status() {
            local name="$1" result="$2"
            echo "$name: $result"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::$name reported $result"
              exit 1
            fi
          }
          status changes      "${{ needs.changes.result }}"
          status spec         "${{ needs.spec.result }}"
          status ext          "${{ needs.ext.result }}"
          status daemon       "${{ needs.daemon.result }}"
          status coordinator  "${{ needs.coordinator.result }}"
          status android      "${{ needs.android.result }}"
          echo "all required jobs ok"
